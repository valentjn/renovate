name: Renovate
on:
  push:
  schedule:
    # need to run once for creating the branches, and then again once to automerge each created branch one-by-one after
    # the CI checks have passed
    - cron: 24 */2 * * *
  workflow_dispatch:
permissions:
  contents: read
jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Renovate
        uses: renovatebot/github-action@693b9ef15eec82123529a37c782242f091365961 # v46.1.14
        with:
          configurationFile: self-hosted.json
          renovate-version: 43.214.1@sha256:55af44f12d1d81aa6155e466ef898b63061f51a0c1e726b7f0df90f13baae8fc # renovate: datasource=docker depName=ghcr.io/renovatebot/renovate
          token: ${{ secrets.VALENTJN_RENOVATE_PAT }}
        env:
          LOG_LEVEL: debug
