name: Renovate
on:
  push:
  schedule:
    # need to run once for creating the branches, and then again once to automerge each created branch one-by-one after
    # the CI checks have passed
    - cron: 24 */2 * * *
  workflow_dispatch:
permissions:
  contents: read
jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Renovate
        uses: renovatebot/github-action@b50d2ba2bd928235abdcc14d06dfafc217f1c565 # v46.1.18
        with:
          configurationFile: self-hosted.json
          renovate-version: 43.269.1@sha256:2d55099f3cd26c0e91fdf69b8a7d904adb7cf0f3039ad33b94b1856d3cf928b4 # renovate: datasource=docker depName=ghcr.io/renovatebot/renovate
          token: ${{ secrets.VALENTJN_RENOVATE_PAT }}
        env:
          LOG_LEVEL: debug
