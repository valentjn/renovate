name: Renovate
on:
  push:
  schedule:
    # need to run once for creating the branches, and then again once to automerge each created branch one-by-one after
    # the CI checks have passed
    - cron: 24 */2 * * *
  workflow_dispatch:
permissions:
  contents: read
jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Renovate
        uses: renovatebot/github-action@79dc0ba74dc3de28db0a7aeb1d0b95d5bf5fde2a # v46.1.13
        with:
          configurationFile: self-hosted.json
          renovate-version: 43.180.3@sha256:f4f4043bf24085c17dd5142d2e56158c04d75c2b894dcccd2921717f2f120b4a # renovate: datasource=docker depName=ghcr.io/renovatebot/renovate
          token: ${{ secrets.VALENTJN_RENOVATE_PAT }}
        env:
          LOG_LEVEL: debug
