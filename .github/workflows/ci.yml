name: CI
on:
  push:
  pull_request:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v6
      - name: set up Node.js
        uses: actions/setup-node@v6
      - name: install npm deps
        run: npm install
      - name: check formatting
        run: npm run fmt:check
